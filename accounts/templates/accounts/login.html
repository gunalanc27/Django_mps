{% extends 'base.html' %}
{% load static %}

{% block title %}Welcome Back - GPZ Store{% endblock %}

{% block content %}
<section class="min-h-[80vh] py-20 flex items-center justify-center bg-base-100 relative overflow-hidden">
    <!-- Background Decor -->
    <div class="absolute inset-x-0 top-0 h-96 bg-gradient-to-b from-primary/5 to-transparent"></div>
    <div class="absolute -top-32 -right-32 w-96 h-96 bg-primary/10 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-[#2563EB]/5 rounded-full blur-[100px]"></div>

    <div class="container mx-auto px-6 relative z-10">
        <div class="max-w-2xl mx-auto">
            <!-- Auth Card -->
            <div class="bg-base-100 p-10 md:p-16 rounded-[4rem] border border-base-200 shadow-2xl shadow-base-200 relative reveal reveal-zoom">
                <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -translate-y-1/2 translate-x-1/2 animate-pulse"></div>
                
                <div class="space-y-10 relative z-10">
                    <div class="text-center space-y-4">
                        <div class="inline-block px-4 py-1.5 rounded-full bg-primary/5 text-primary text-[10px] font-black uppercase tracking-[0.2em] border border-primary/20 mb-4">
                            Premium Access
                        </div>
                        <h2 class="text-5xl font-black tracking-tighter leading-none italic text-slate-950 uppercase">Welcome Back</h2>
                        <p class="text-base-content/50 font-medium tracking-tight">Login to continue your premium shopping experience</p>
                    </div>
                    
                    <form method="post" class="space-y-8">
                        {% csrf_token %}
                        <div class="space-y-6">
                            <div class="form-control w-full reveal reveal-up delay-100">
                                <label class="label"><span class="label-text font-black uppercase tracking-widest text-[10px]">Username</span></label>
                                <div class="relative group">
                                    <div class="absolute inset-y-0 left-6 flex items-center text-base-content/20 group-focus-within:text-primary transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                        </svg>
                                    </div>
                                    <input type="text" name="username" placeholder="lux_consumer" 
                                           class="input input-lg w-full bg-base-200/50 border-base-300 rounded-[1.25rem] pl-16 font-bold focus:bg-white focus:border-primary transition-all" required />
                                </div>
                            </div>
                            
                            <div class="form-control w-full reveal reveal-up delay-200">
                                <label class="label"><span class="label-text font-black uppercase tracking-widest text-[10px]">Password</span></label>
                                <div class="relative group">
                                    <div class="absolute inset-y-0 left-6 flex items-center text-base-content/20 group-focus-within:text-primary transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                    </div>
                                    <input type="password" name="password" placeholder="••••••••" 
                                           class="input input-lg w-full bg-base-200/50 border-base-300 rounded-[1.25rem] pl-16 font-bold focus:bg-white focus:border-primary transition-all" required />
                                </div>
                            </div>
                        </div>
                        
                        <div class="pt-6">
                            <button type="submit" class="btn btn-primary btn-lg btn-block h-20 rounded-[1.5rem] shadow-2xl shadow-primary/20 font-black text-xl tracking-tight uppercase group italic">
                                Sign In
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 ml-2 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                                </svg>
                            </button>
                        </div>
                    </form>
                    
                    <div class="text-center pt-8 border-t border-base-200">
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] opacity-30 mb-4">Don't have a membership?</p>
                        <a href="{% url 'accounts:register' %}" class="btn btn-ghost rounded-full font-bold px-12 hover:bg-primary/5 hover:text-primary uppercase tracking-tight">Create an Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
