{% extends "base.html" %}

{% block title %}Contact Us{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1>Contact Us</h1>
    <hr>
    <div class="row">
        <div class="col-md-6">
            <h3>Send us a message</h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label>Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Subject</label>
                    <input type="text" name="subject" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Message</label>
                    <textarea name="message" class="form-control" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </div>
        <div class="col-md-6">
            <h3>Get in Touch</h3>
            <div class="card mt-3">
                <div class="card-body">
                    <h5>Address</h5>
                    <p>123 Store Street, City, Country</p>
                    <h5>Phone</h5>
                    <p>+1 234 567 890</p>
                    <h5>Email</h5>
                    <p>info@store.com</p>
                    <h5>Hours</h5>
                    <p>Mon-Fri: 9AM - 6PM</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
